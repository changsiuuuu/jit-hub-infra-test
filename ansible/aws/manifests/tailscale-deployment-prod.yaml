# tailscale-deployment.yaml 파일
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tailscale-router
  namespace: tailscale
spec:
  selector:
    matchLabels:
      app: tailscale
  template:
    metadata:
      labels:
        app: tailscale
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: tailscale-sa
      containers:
      - name: tailscale
        image: tailscale/tailscale:latest
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: TS_KUBE_SECRET
          value: "tailscale-$(NODE_NAME)"
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth
              key: TS_AUTHKEY
        - name: TS_EXTRA_ARGS
          value: "--advertise-tags=tag:prod-subnet-router --accept-routes --hostname=eks-router-$(NODE_NAME)"
        - name: TS_USERSPACE
          value: "false"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
            - NET_RAW
        lifecycle:
          postStart:
            exec:
              command:
              - /bin/sh
              - -c
              - |
                set -e
                
                # 최대 30초 대기 (무한 루프 방지: 0.5초 * 60회)
                for i in $(seq 1 60); do
                  ip link show tailscale0 >/dev/null 2>&1 && break
                  sleep 0.5
                done
                
                # AWS VPC CNI가 사용하는 라우팅 테이블 번호(52) 우회 룰 적용 (이미 있으면 스킵)
                ip rule show | grep -q "172.16.8.0/24" || ip rule add to 172.16.8.0/24 lookup 52 pref 100
                
                # iptables 룰 중복 적용 방지 검증 후 삽입 (-C 로 검증)
                iptables -t nat -C POSTROUTING -o tailscale0 -j MASQUERADE >/dev/null 2>&1 \
                  || iptables -t nat -A POSTROUTING -o tailscale0 -j MASQUERADE
                
                echo "Routing configured successfully" > /tmp/routing-ready
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - |
              # 라우팅 룰과 iptables 룰이 실제로 적용되었는지 둘 다 검증
              ip rule show | grep -q "172.16.8.0/24" && \
              iptables -t nat -C POSTROUTING -o tailscale0 -j MASQUERADE >/dev/null 2>&1
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        - name: tun
          mountPath: /dev/net/tun
      volumes:
      - name: tun
        hostPath:
          path: /dev/net/tun