# tailscale-deployment.yaml 파일
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tailscale-router
  namespace: tailscale
spec:
  selector:
    matchLabels:
      app: tailscale
  template:
    metadata:
      labels:
        app: tailscale
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: tailscale-sa
      containers:
      - name: tailscale
        image: tailscale/tailscale:latest
        env:
        - name: TS_AUTHKEY
          valueFrom:
            secretKeyRef:
              name: tailscale-auth
              key: TS_AUTHKEY
        - name: TS_EXTRA_ARGS
          value: "--advertise-tags=tag:dr-subnet-router --advertise-routes=10.10.0.0/16,172.30.0.0/16 --accept-routes"
        - name: TS_USERSPACE
          value: "false"
        securityContext:
          capabilities:
            add:
            - NET_ADMIN
        volumeMounts:
        - name: tun
          mountPath: /dev/net/tun

      - name: routing-configurer
        image: alpine:latest
        securityContext:
          privileged: true
        command: ["/bin/sh", "-c"]
        args:
        - |
          apk add iproute2 iptables
          # Wait for tailscale interface to come up
          while ! ip link show tailscale0 > /dev/null 2>&1; do sleep 1; done
          # Bypass AWS VPC CNI policy routing drops
          ip rule add to 172.16.8.0/24 lookup 52 pref 100 || true
          # Fix asymmetric routing by MASQUERADING traffic entering the tunnel
          iptables -t nat -A POSTROUTING -o tailscale0 -j MASQUERADE || true
          sleep infinity
      
      volumes:
      - name: tun
        hostPath:
          path: /dev/net/tun