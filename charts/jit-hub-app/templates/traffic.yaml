apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-db
  template:
    metadata:
      labels:
        app: traffic-db
    spec:
      containers:
        - name: postgres
          image: postgres:15-alpine
          env:
            - name: POSTGRES_DB
              value: traffic_db
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              value: postgres
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-db
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: traffic-db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-service
  template:
    metadata:
      labels:
        app: traffic-service
    spec:
      containers:
        - name: traffic-service
          image: "{{ .Values.traffic.image.repository }}:{{ .Values.traffic.image.tag }}"
          imagePullPolicy: IfNotPresent
          env:
            - name: JITHUB_LOCATION
              value: K8S-DEV
            - name: JITHUB_DATABASE_URL
              value: postgresql://postgres:postgres@traffic-db:5432/traffic_db
            - name: JITHUB_AUTH_SERVICE_URL
              value: http://auth-service:{{ .Values.auth.service.port }}
          ports:
            - containerPort: {{ .Values.traffic.service.port }}
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-service
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.traffic.service.port }}
      targetPort: {{ .Values.traffic.service.port }}
  selector:
    app: traffic-service
