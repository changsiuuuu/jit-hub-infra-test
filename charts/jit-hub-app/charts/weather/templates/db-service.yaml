{{- if .Values.db.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: weather-db
spec:
  type: {{ .Values.db.serviceType | default "ClusterIP" }}
  {{- if .Values.db.loadBalancerIP }}
  loadBalancerIP: {{ .Values.db.loadBalancerIP }}
  {{- end }}
  ports:
  - port: 5432
    targetPort: 5432
  selector:
    app: weather-db
{{- end }}
