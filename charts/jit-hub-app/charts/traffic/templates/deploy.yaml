apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: traffic
  template:
    metadata:
      labels:
        app: traffic
    spec:
      containers:
      - name: traffic
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: {{ .Values.service.port }}
        env:
        - name: DATABASE_URL
          value: "postgresql://postgres:{{ .Values.db.password }}@traffic-db:5432/postgres"
