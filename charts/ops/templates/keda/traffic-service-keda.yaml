apiVersion: keda.sh/v1alpha1
kind: ScaledObject

metadata:
  name: traffic-service-scaler
  namespace: {{ .Values.keda.namespace | default "jit-hub" }}

spec:
  scaleTargetRef:
    # jit-hub-app의 Deployment 이름과 일치해야 합니다.
    name: traffic-service
    kind: Deployment

  minReplicaCount: {{ .Values.keda.minReplicaCount | default 1 }}
  maxReplicaCount: {{ .Values.keda.maxReplicaCount | default 5 }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod | default 300 }}

  triggers:
    - type: prometheus
      metadata:
        # kube-prometheus-stack의 Prometheus 서비스 주소
        serverAddress: {{ .Values.keda.serverAddress | quote }}

        # KEDA가 HPA에 노출할 외부 메트릭 이름
        metricName: traffic_request_rate

        # traffic-service의 최근 1분간 초당 요청 수
        query: |
          sum(rate(http_requests_total{job="traffic-service"}[1m]))

        # 스케일링 기준값
        threshold: {{ .Values.keda.threshold | default "10" | quote }}