{{- if .Values.ingestIngress.enabled }}
# EKS 클러스터들이 remote_write/push로 보내는 메트릭/로그를 수신하는 Ingress (onprem 전용)
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingest
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: prometheus-ingest.{{ .Values.ingestIngress.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingestIngress.prometheusServiceName }}
                port:
                  number: 9090

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki-ingest
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: loki-ingest.{{ .Values.ingestIngress.domain }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ .Values.ingestIngress.lokiServiceName }}
                port:
                  number: 3100
{{- end }}
