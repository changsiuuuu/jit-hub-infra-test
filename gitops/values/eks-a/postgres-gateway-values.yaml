enabled: true
replicaCount: 1

# 임시 진단: Tailscale egress가 확인된 10.0.1.0/24 (ap-northeast-2a) 노드에 고정
nodeSelector:
  topology.kubernetes.io/zone: ap-northeast-2a

tailscale:
  # PgBouncer와 같은 Pod network namespace를 공유하므로 kubelet/Service 트래픽을
  # 방해하지 않도록 Tailscale의 iptables 관리 기능을 비활성화한다.
  # 기존 subnet router가 광고한 10.0.0.0/16을 수락하면 Pod의 로컬 VPC 대역과 충돌한다.
  extraArgs: "--reset --netfilter-mode=off --hostname=postgres-gateway"
  onPremRoute: "172.16.8.0/24"
