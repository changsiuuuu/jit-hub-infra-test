# gitops/values/eks-a/jit-hub-values.yaml
# Umbrella Chart (Subchart) 구조에 맞게 작성된 EKS-A (Active) 환경 설정

ingressRule:
  namespace: "jit-hub"
  host: "leechs.shop" # 필요시 eks-a 전용 도메인으로 변경 가능
gateway:
  replicaCount: 1
  image:
    repository: "harbor.leechs.shop/jit-hub/jit-hub-gateway"
    tag: "v1"
auth:
  replicaCount: 1
  image:
    repository: "harbor.leechs.shop/jit-hub/auth-service"
    tag: "v1"
  db:
    enabled: false
    host: "postgres-gateway"
weather:
  replicaCount: 1
  image:
    repository: "harbor.leechs.shop/jit-hub/weather-service"
    tag: "v1"
  db:
    enabled: false
    host: "postgres-gateway"
traffic:
  replicaCount: 1
  image:
    repository: "harbor.leechs.shop/jit-hub/traffic-service"
    tag: "v1"
  db:
    enabled: false
    host: "postgres-gateway"
tourist:
  replicaCount: 1
  image:
    repository: "harbor.leechs.shop/jit-hub/tourist-service"
    tag: "v1"
  db:
    enabled: false
    host: "postgres-gateway"
